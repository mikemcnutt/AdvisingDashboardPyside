name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 PyInstaller pywin32

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --clean --windowed --collect-all PySide6 --name AdvisingDashboard fred2_trackfilterfont_fixed.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdvisingDashboard-Windows
          path: dist/AdvisingDashboard
