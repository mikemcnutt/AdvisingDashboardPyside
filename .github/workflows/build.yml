name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6
          pip install pyinstaller
          pip install pywin32

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --windowed --name "AdvisingDashboard" advising_dashboard_glass.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: advising-dashboard-windows
          path: dist/AdvisingDashboard
          retention-days: 30
