name: Build Windows EXE

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6
          pip install pyinstaller
          pip install pywin32

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --name="AdvisingDashboard" --onefile --windowed --icon=NONE advising_dashboard_glass.py

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: advising-dashboard-windows
          path: dist/AdvisingDashboard.exe
          retention-days: 30
